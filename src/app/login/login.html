<main class="w-full h-screen flex items-center justify-center">
  <div class="flex flex-col bg-white p-8 rounded-lg shadow-2xl w-full max-w-md gap-6">
    <h1 class="text-2xl font-bold text-gray-800">Inicio de sesión</h1>
    <form class="flex flex-col gap-10">
      <div class="flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <label class="text-gray-400 font-semibold text-sm" for="username">Correo electrónico</label>
          <input class="p-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary" type="text" id="username" name="username" required>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-gray-400 font-semibold text-sm" for="password">Contraseña</label>
          <input class="p-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary" type="password" id="password" name="password" required>
        </div>
      </div>
      <button class="bg-primary text-white rounded-lg p-2 w-auto text-lg font-bold" type="submit">Ingresar</button>
    </form>
  </div>
</main>
